# This project was generated with 0.3.15 using template: https://github.com/beeware/briefcase-template@v0.3.15
[tool.briefcase]
project_name = "easy-mqtt-handler-2"
bundle = "com.atmanactive"
version = "2.0.5"
url = "https://github.com/AtmanActive/easy-mqtt-handler-2"
license.file = "LICENSE"
# fork maintainer; original work is Copyright (C) 2023 A. Zeil (GPLv3+),
# see the per-file headers and LICENSE
author = "AtmanActive"
author_email = "AtmanActive@users.noreply.github.com"

[tool.briefcase.app.easy-mqtt-handler]
formal_name = "Easy MQTT Handler 2"
description = "User-friendly MQTT Client to receive messages from Brokers and react with executing pre-defined commands."
long_description = "easy MQTT Handler is a MQTT Client implemented in Python3 that will connect to a MQTT Broker, listening for freely configurable messages and reacting by executing arbitrary pre-defined commands. The Tool comes with a QT5-based GUI (License: GPLv3+)."
icon = "src/easy_mqtt_handler/assets/app-icon/app-icon"
sources = ["src/easy_mqtt_handler"]
test_sources = ["tests"]




requires = ["paho-mqtt~=2.1.0", "PyQt5~=5.15.11", "pyOpenSSL~=24.2.1", "cryptography~=42.0.4"]
test_requires = ["pytest", "paho-mqtt~=2.1.0", "PyQt5~=5.15.11", "pyOpenSSL~=24.2.1", "cryptography~=42.0.4"]

[tool.briefcase.app.easy-mqtt-handler.macOS]
requires = ["paho-mqtt~=2.1.0", "PyQt5~=5.15.11", "pyOpenSSL~=24.2.1", "cryptography~=42.0.4"]

[tool.briefcase.app.easy-mqtt-handler.linux]
requires = ["paho-mqtt~=2.1.0", "PyQt5~=5.15.11", "pyOpenSSL~=24.2.1", "cryptography~=42.0.4"]

[tool.briefcase.app.easy-mqtt-handler.linux.system.debian]
# needed to build the package; briefcase checks these are present before starting
system_requires = [
    "python3-dev",
    "build-essential",
]
# these become the package's Depends. PyQt5 ships its own copy of Qt, but Qt
# still needs these libraries from the distribution to open a window at all.
system_runtime_requires = [
    "libgl1",
    "libegl1",
    "libxkbcommon-x11-0",
    "libdbus-1-3",
    "libxcb-icccm4",
    "libxcb-image0",
    "libxcb-keysyms1",
    "libxcb-randr0",
    "libxcb-render-util0",
    "libxcb-shape0",
    "libxcb-xinerama0",
    "libxcb-xfixes0",
]

[tool.briefcase.app.easy-mqtt-handler.linux.system.rhel]
system_requires = []
system_runtime_requires = []

[tool.briefcase.app.easy-mqtt-handler.linux.system.arch]
system_requires = []
system_runtime_requires = []

[tool.briefcase.app.easy-mqtt-handler.linux.appimage]
manylinux = "manylinux_2_28"
system_requires = []
linuxdeploy_plugins = []

[tool.briefcase.app.easy-mqtt-handler.linux.flatpak]
flatpak_runtime = "org.freedesktop.Platform"
# a new freedesktop major version appears each August and is supported for two
# years, so this needs revisiting roughly annually. 22.08 was EOL in Aug 2024.
flatpak_runtime_version = "25.08"
flatpak_sdk = "org.freedesktop.Sdk"

[tool.briefcase.app.easy-mqtt-handler.windows]
requires = ["paho-mqtt~=2.1.0", "PyQt5~=5.15.11", "pyOpenSSL~=24.2.1", "cryptography~=42.0.4"]

# Mobile deployments
[tool.briefcase.app.easy-mqtt-handler.iOS]
supported = false

[tool.briefcase.app.easy-mqtt-handler.android]
supported = false

# Web deployments
[tool.briefcase.app.easy-mqtt-handler.web]
supported = false

[tool.pytest.ini_options]
# the app lives under src/, so put it on the path instead of requiring an install
# "." makes the tasks.py build helper importable by its tests
pythonpath = ["src", "."]
testpaths = ["tests"]
# unclosed config/license files were a real leak here once; keep them fatal
filterwarnings = ["error::ResourceWarning"]
